# Base H2 en memoire pour les tests : pas besoin de MySQL demarre
spring.datasource.url=jdbc:h2:mem:creditdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Meme cle que la config principale, necessaire pour signer/valider des tokens de test coherents
jwt.secret=ceci-est-une-cle-secrete-tres-longue-pour-signer-les-tokens-jwt-bank-platform-2026