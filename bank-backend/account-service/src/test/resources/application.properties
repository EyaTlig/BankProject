# Base H2 en memoire pour les tests : pas besoin de MySQL demarre
spring.datasource.url=jdbc:h2:mem:accountdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Meme cle que la config principale, necessaire pour signer/valider des tokens de test coherents
jwt.secret=ceci-est-une-cle-secrete-tres-longue-pour-signer-les-tokens-jwt-bank-platform-2026

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
rabbitmq.exchange.user=user.exchange
rabbitmq.queue.user-created=user.created.queue
rabbitmq.routingkey.user-created=user.created
# Le @RabbitListener (UserCreatedListener) ne doit pas tenter de se connecter a un vrai
# broker pendant les tests : on desactive son demarrage automatique (RabbitTemplate reste
# disponible pour les beans non mockes, mais rien ne tente de se connecter au chargement du contexte)
spring.rabbitmq.listener.simple.auto-startup=false

spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=test
spring.mail.password=test

transfer.otp.expiration-minutes=5
recurring-transfer.scheduler.cron=0 0 2 * * *