# Base H2 en memoire pour les tests : pas besoin de MySQL demarre
spring.datasource.url=jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Meme cle que la config principale, necessaire pour generer des tokens de test coherents
jwt.secret=ceci-est-une-cle-secrete-tres-longue-pour-signer-les-tokens-jwt-bank-platform-2026
jwt.expiration=86400000

otp.expiration-minutes=5

# RabbitMQ/SMTP : valeurs factices, les beans reels sont mockes (@MockBean) dans les tests
# d'integration qui en ont besoin ; ces valeurs servent juste a satisfaire l'auto-configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
rabbitmq.exchange.user=user.exchange
rabbitmq.routingkey.user-created=user.created

spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=test
spring.mail.password=test

admin.bootstrap.email=admin@test.local
admin.bootstrap.password=Test@1234!