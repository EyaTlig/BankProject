<div class="app-shell">

  <aside class="sidebar">
    <div class="sidebar-brand">
      <img src="/ammenlogo.png" alt="AMEN BANK Logo" class="brand-logo" />
      <span>AMMEN BANK</span>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">
        <i class="ti ti-layout-dashboard"></i> Tableau de bord
      </a>
      <a routerLink="/accounts" routerLinkActive="active" class="nav-item">
        <i class="ti ti-credit-card"></i> Mes comptes
      </a>
      <a routerLink="/transfers" routerLinkActive="active" class="nav-item">
        <i class="ti ti-arrows-exchange"></i> Virements
      </a>
          <a routerLink="/transfers/bulk" routerLinkActive="active" class="nav-item">
              <i class="ti ti-file-spreadsheet"></i> Virements groupés
           </a>
      <a routerLink="/recurring-transfers" routerLinkActive="active" class="nav-item">
        <i class="ti ti-repeat"></i> Permanents
      </a>
      <a routerLink="/credits" routerLinkActive="active" class="nav-item">
        <i class="ti ti-receipt"></i> Crédits
      </a>
    </nav>

    <button class="logout-button" (click)="logout()">
      <i class="ti ti-logout"></i> Déconnexion
    </button>
  </aside>

  <main class="app-content">
    <router-outlet></router-outlet>
  </main>
</div>
