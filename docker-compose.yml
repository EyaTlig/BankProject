version: '3.8'

services:

  mysql-auth:
    image: mysql:8.0
    container_name: mysql-auth
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: auth_db
    ports:
      - "3307:3306"
    volumes:
      - auth_data:/var/lib/mysql
    networks:
      - bank-network

  mysql-account:
    image: mysql:8.0
    container_name: mysql-account
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: account_db
    ports:
      - "3308:3306"
    volumes:
      - account_data:/var/lib/mysql
    networks:
      - bank-network

  mysql-transfer:
    image: mysql:8.0
    container_name: mysql-transfer
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: transfer_db
    ports:
      - "3309:3306"
    volumes:
      - transfer_data:/var/lib/mysql
    networks:
      - bank-network

  mysql-credit:
    image: mysql:8.0
    container_name: mysql-credit
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: credit_db
    ports:
      - "3310:3306"
    volumes:
      - credit_data:/var/lib/mysql
    networks:
      - bank-network

  mysql-admin:
    image: mysql:8.0
    container_name: mysql-admin
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: admin_db
    ports:
      - "3311:3306"
    volumes:
      - admin_data:/var/lib/mysql
    networks:
      - bank-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    restart: always
    environment:
      PMA_ARBITRARY: 1
    ports:
      - "8086:80"
    networks:
      - bank-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - bank-network

  auth-service:
    build:
      context: ./bank-backend/auth-service
    container_name: auth-service
    restart: always
    depends_on:
      - mysql-auth
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-auth:3306/auth_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports:
      - "8081:8081"
    networks:
      - bank-network

  account-service:
    build:
      context: ./bank-backend/account-service
    container_name: account-service
    restart: always
    depends_on:
      - mysql-account
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-account:3306/account_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports:
      - "8082:8082"
    networks:
      - bank-network

  credit-service:
    build:
      context: ./bank-backend/credit-service
    container_name: credit-service
    restart: always
    depends_on:
      - mysql-credit
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-credit:3306/credit_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports:
      - "8083:8083"
    networks:
      - bank-network

  chatbot-service:
    build:
      context: ./bank-backend/chatbot-service
    container_name: chatbot-service
    restart: always
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      ALLOWED_ORIGINS: http://localhost:4200
    ports:
      - "8084:8084"
    networks:
      - bank-network

  frontend:
    build:
      context: ./bank-frontend
    container_name: frontend
    restart: always
    depends_on:
      - auth-service
      - account-service
      - credit-service
      - chatbot-service
    ports:
      - "4200:80"
    networks:
      - bank-network

networks:
  bank-network:
    driver: bridge

volumes:
  auth_data:
  account_data:
  transfer_data:
  credit_data:
  admin_data: